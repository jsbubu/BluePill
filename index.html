<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BluePill Logger</title>
    <script src="chart.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

        :root {
            --bg: #0a0e14;
            --surface: #111820;
            --border: #1e2a35;
            --accent: #00d4ff;
            --accent2: #00ff9d;
            --warn: #ff6b35;
            --text: #c8d8e8;
            --muted: #4a6070;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

        header { margin-bottom: 2rem; }
        .logo {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        h1 { font-family: var(--mono); font-size: 28px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
        h1 span { color: var(--accent2); }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-family: var(--mono);
            font-size: 12px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
        .dot.connected { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
        .dot.connecting { background: var(--accent); animation: blink 0.6s infinite; }
        .dot.dumping { background: var(--warn); animation: blink 0.4s infinite; }
        
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        #status-text { color: var(--text); flex: 1; }
        #device-name { color: var(--muted); font-size: 10px; }

        .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 1.5rem; }
        .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .metric-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .metric-value { font-family: var(--mono); font-size: 20px; font-weight: 600; color: #fff; line-height: 1; }
        .metric-value.accent { color: var(--accent); }
        .metric-value.warn { color: var(--warn); }
        .metric-unit { font-size: 11px; color: var(--muted); margin-left: 2px; }

        .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 1.5rem; }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .chart-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; }
        .chart-range { font-family: var(--mono); font-size: 10px; color: var(--accent); }
        .chart-wrap { position: relative; height: 180px; }

        .btn-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
        button {
            flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 8px;
            background: var(--surface); color: var(--text); font-family: var(--mono);
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        button:active { transform: scale(0.97); }
        #btn-connect { border-color: var(--accent); color: var(--accent); }
        #btn-connect.active { background: var(--accent); color: var(--bg); }
        #btn-export { border-color: var(--muted); color: var(--muted); }
        #btn-export.ready { border-color: var(--accent2); color: var(--accent2); }
        #btn-clear { border-color: var(--warn); color: var(--warn); flex: 0 0 auto; padding: 14px 16px; }

        .log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 1rem; }
        .log-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .log-title { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; }
        #log { font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 12px 14px; height: 120px; overflow-y: auto; line-height: 1.6; }
        #log .ok { color: var(--accent2); }
        #log .info { color: var(--accent); }
        #log .warn { color: var(--warn); }

        #csv-card { display: none; }
        #csv-output { width: 100%; height: 150px; background: #000; color: var(--accent2); font-family: var(--mono); font-size: 10px; border: none; padding: 12px; resize: none; }

        footer { text-align: center; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2rem; }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="logo">Firmware v2.1 · BLE 5.0</div>
        <h1>Blue<span>Pill</span></h1>
    </header>

    <div class="status-bar">
        <div class="dot" id="dot"></div>
        <span id="status-text">Prêt</span>
        <span id="device-name"></span>
    </div>

    <div class="metrics">
        <div class="metric">
            <div class="metric-label">Points</div>
            <div class="metric-value accent" id="m-count">0</div>
        </div>
        <div class="metric">
            <div class="metric-label">Min</div>
            <div class="metric-value" id="m-min">—</div>
        </div>
        <div class="metric">
            <div class="metric-label">Max</div>
            <div class="metric-value warn" id="m-max">—</div>
        </div>
    </div>

    <div class="chart-card">
        <div class="chart-header">
            <span class="chart-title">Visualisation Temps-Réel</span>
            <span class="chart-range" id="chart-range">—</span>
        </div>
        <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="btn-row">
        <button id="btn-connect">Connecter</button>
        <button id="btn-export" disabled>Attente données</button>
        <button id="btn-clear">✕</button>
    </div>

    <div class="log-card" id="csv-card">
        <div class="log-header">
            <span class="log-title">Dernier Export CSV</span>
            <button id="btn-share" style="padding:4px 8px; font-size:10px; color:var(--accent2); border-color:var(--accent2)">Partager</button>
        </div>
        <textarea id="csv-output" readonly></textarea>
    </div>

    <div class="log-card">
        <div class="log-header"><span class="log-title">Console Système</span></div>
        <div id="log"></div>
    </div>

    <footer>OPEN IN BLUEFY FOR IOS</footer>
</div>

<script>
// --- CONFIGURATION ---
const SERVICE_UUID  = '00001809-0000-1000-8000-00805f9b34fb'; 
const CHAR_HISTORY  = 'a838e31a-d72f-4a89-8a21-a47fd67da42f';

// --- ÉTAT ---
let temperatures = [];
let device = null;
let char = null;
let chart = null;
let savedDeviceName = "BluePill-Unknown";
let lastCSV = '';
let lastFilename = '';

// --- INITIALISATION GRAPHIQUE ---
function initChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#00d4ff',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(0,212,255,0.05)',
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: false },
                y: { grid: { color: '#1e2a35' }, ticks: { color: '#4a6070', font: { family: 'IBM Plex Mono' } } }
            }
        }
    });
}

// --- LOGIQUE BLUETOOTH ---
async function connect() {
    try {
        log("Recherche d'un appareil BluePill...", "info");
        setStatus('connecting', 'Scan...', '');

        device = await navigator.bluetooth.requestDevice({
            filters: [{ namePrefix: 'BluePill' }],
            optionalServices: [SERVICE_UUID]
        });

        savedDeviceName = device.name;
        log(`Appareil sélectionné : ${savedDeviceName}`, "ok");
        setStatus('connecting', 'Liaison...', savedDeviceName);

        device.addEventListener('gattserverdisconnected', onDisconnected);

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        char = await service.getCharacteristic(CHAR_HISTORY);

        char.addEventListener('characteristicvaluechanged', onIndication);
        await char.startNotifications();

        log("Liaison établie. Réception active.", "ok");
        setStatus('dumping', 'Réception...', savedDeviceName);
        
        document.getElementById('btn-connect').textContent = 'Déconnecter';
        document.getElementById('btn-connect').classList.add('active');

    } catch (err) {
        log(`Erreur : ${err.message}`, "warn");
        setStatus('', 'Erreur', '');
    }
}

function onIndication(event) {
    const data = event.target.value;
    const count = data.byteLength / 2;

    for (let i = 0; i < count; i++) {
        const raw = data.getInt16(i * 2, true);
        temperatures.push(raw / 10.0);
    }

    updateUI();
}

function updateUI() {
    if (temperatures.length === 0) return;

    // Metrics
    const min = Math.min(...temperatures);
    const max = Math.max(...temperatures);
    document.getElementById('m-count').textContent = temperatures.length;
    document.getElementById('m-min').textContent = min.toFixed(1) + "°C";
    document.getElementById('m-max').textContent = max.toFixed(1) + "°C";

    // Chart
    chart.data.labels = temperatures.map((_, i) => i);
    chart.data.datasets[0].data = temperatures;
    chart.update();

    // Bouton Export
    const btnExp = document.getElementById('btn-export');
    btnExp.disabled = false;
    btnExp.classList.add('ready');
    btnExp.textContent = "Finaliser & Exporter";
    
    // Range
    const mins = (temperatures.length - 1) * 5;
    document.getElementById('chart-range').textContent = `Couverture : ${Math.floor(mins/60)}h${(mins%60).toString().padStart(2,'0')}`;
}

async function exportCSV() {
    if (temperatures.length === 0) return;

    log("Génération du rapport CSV...", "info");
    const now = new Date();
    const dateStr = now.toISOString().slice(0, 10);
    const timeStr = now.getHours() + 'h' + now.getMinutes().toString().padStart(2, '0');
    
    lastFilename = `${savedDeviceName.replace(/[^a-z0-9]/gi, '_')}_${dateStr}_${timeStr}.csv`;

    let csv = `ID LOGGER;${savedDeviceName}\n`;
    csv += `DATE DUMP;${now.toLocaleString('fr-FR')}\n`;
    csv += `POINTS;${temperatures.length}\n`;
    csv += `----------------------------------------\n`;
    csv += `index;timestamp;temp_c\n`;

    temperatures.forEach((t, i) => {
        const offset = (temperatures.length - 1 - i) * 5 * 60000;
        const ts = new Date(now.getTime() - offset);
        csv += `${i};${ts.toLocaleString('fr-FR').replace(',','')};${t.toFixed(1)}\n`;
    });

    lastCSV = csv;
    document.getElementById('csv-output').value = csv;
    document.getElementById('csv-card').style.display = 'block';

    // Téléchargement
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = lastFilename;
    a.click();

    log("Export réussi. Déconnexion de l'unité.", "ok");
    
    // DÉCONNEXION FINALE
    if (device && device.gatt.connected) {
        await device.gatt.disconnect();
    }
}

function onDisconnected() {
    log("Unité déconnectée.", "warn");
    setStatus('', 'Déconnecté', '');
    document.getElementById('btn-connect').textContent = 'Connecter';
    document.getElementById('btn-connect').classList.remove('active');
    char = null;
    device = null;
}

// --- HELPERS ---
function setStatus(state, text, devName) {
    document.getElementById('dot').className = 'dot ' + state;
    document.getElementById('status-text').textContent = text;
    document.getElementById('device-name').textContent = devName;
}

function log(msg, cls) {
    const div = document.createElement('div');
    if(cls) div.className = cls;
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    const container = document.getElementById('log');
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// --- LISTENERS ---
document.getElementById('btn-connect').addEventListener('click', () => {
    if (device && device.gatt.connected) device.gatt.disconnect();
    else connect();
});

document.getElementById('btn-export').addEventListener('click', exportCSV);

document.getElementById('btn-clear').addEventListener('click', () => {
    if (!confirm("Effacer les données actuelles ?")) return;
    temperatures = [];
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();
    document.getElementById('m-count').textContent = "0";
    document.getElementById('csv-card').style.display = 'none';
    log("Mémoire interface vidée.", "warn");
});

document.getElementById('btn-share').addEventListener('click', async () => {
    const file = new File([lastCSV], lastFilename, { type: 'text/csv' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: lastFilename });
    }
});

initChart();
</script>
</body>
</html>
