<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePill Logger - Robust</title>
<script src="chart.umd.js"></script>
<style>
body { background:#0a0e14; color:#c8d8e8; font-family: monospace; }
button { margin:5px; padding:10px; }
#log { height:200px; overflow:auto; background:#000; padding:10px; }
</style>
</head>
<body>
<h2>BluePill Logger (Robust)</h2>
<button id="btn-connect">Connect</button>
<button id="btn-export" disabled>Export</button>
<canvas id="chart" height="100"></canvas>
<div id="log"></div>

<script>
const SERVICE_UUID  = '00001809-0000-1000-8000-00805f9b34fb'; 
const CHAR_HISTORY  = 'a838e31a-d72f-4a89-8a21-a47fd67da42f';

let device = null;
let char = null;
let temperatures = [];
let lastPacketTime = null;
let expectedInterval = 200; // ms estimé
let packetCount = 0;
let lostWarnings = 0;
let chart;

function log(msg, type="INFO") {
  const el = document.getElementById('log');
  const line = `[${new Date().toLocaleTimeString()}][${type}] ${msg}`;
  el.innerHTML += line + "<br>";
  el.scrollTop = el.scrollHeight;
}

function initChart(){
  const ctx = document.getElementById('chart');
  chart = new Chart(ctx, {
    type:'line',
    data:{labels:[], datasets:[{data:[], borderWidth:1}]},
    options:{animation:false}
  });
}

async function connect(){
  try{
    log("Scan...");

    device = await navigator.bluetooth.requestDevice({
      filters:[{namePrefix:'BluePill'}],
      optionalServices:[SERVICE_UUID]
    });

    log("Device: " + device.name);

    device.addEventListener('gattserverdisconnected', onDisconnected);

    const server = await device.gatt.connect();
    log("GATT connecté");

    const service = await server.getPrimaryService(SERVICE_UUID);
    log("Service OK");

    char = await service.getCharacteristic(CHAR_HISTORY);
    log("Characteristic OK");

    await char.startNotifications();
    log("Notifications ON");

    char.addEventListener('characteristicvaluechanged', onData);

  }catch(e){
    log("Erreur: "+e.message, "ERR");
  }
}

function onData(event){
  const now = Date.now();
  const dv = event.target.value;
  const count = dv.byteLength / 2;

  packetCount++;

  // Detection de trous timing
  if(lastPacketTime){
    const dt = now - lastPacketTime;
    if(dt > expectedInterval * 3){
      lostWarnings++;
      log(`⚠ GAP détecté: ${dt}ms`, "WARN");
    }
  }
  lastPacketTime = now;

  log(`RX packet #${packetCount} (${count} samples)`);

  for(let i=0;i<count;i++){
    const raw = dv.getInt16(i*2,true);
    const temp = raw/10;

    // sanity check
    if(temp < -50 || temp > 150){
      log("Valeur aberrante: "+temp, "WARN");
    }

    temperatures.push(temp);
  }

  updateChart();
  document.getElementById('btn-export').disabled = false;
}

function updateChart(){
  const MAX = 2000;
  const data = temperatures.slice(-MAX);

  chart.data.labels = data.map((_,i)=>i);
  chart.data.datasets[0].data = data;
  chart.update();
}

function exportCSV(){
  if(temperatures.length === 0) return;

  let csv = "index,temp\n";
  temperatures.forEach((t,i)=>{
    csv += `${i},${t}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "dump.csv";
  a.click();

  log(`Export OK (${temperatures.length} points)`);

  if(lostWarnings>0){
    log(`⚠ ${lostWarnings} anomalies détectées`, "WARN");
  } else {
    log("Aucune perte détectée (heuristique)");
  }

  if(device && device.gatt.connected){
    device.gatt.disconnect();
  }
}

function onDisconnected(){
  log("Déconnecté", "WARN");

  if(temperatures.length>0){
    log("⚠ Dump potentiellement incomplet", "WARN");
  }
}

document.getElementById('btn-connect').onclick = ()=>{
  if(device && device.gatt.connected){
    device.gatt.disconnect();
  } else connect();
};

document.getElementById('btn-export').onclick = exportCSV;

initChart();
</script>
</body>
</html>
