<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BluePill Logger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:       #0a0e14;
    --surface:  #111820;
    --border:   #1e2a35;
    --accent:   #00d4ff;
    --accent2:  #00ff9d;
    --warn:     #ff6b35;
    --text:     #c8d8e8;
    --muted:    #4a6070;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grid scan animation bg ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* ── Header ── */
  header { margin-bottom: 2rem; }
  .logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  h1 {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent2); }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    font-size: 12px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.connected   { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
  .dot.connecting  { background: var(--accent);  animation: blink 0.6s infinite; }
  .dot.dumping     { background: var(--warn);    animation: blink 0.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  #status-text { color: var(--text); flex: 1; }
  #device-name { color: var(--muted); font-size: 10px; }

  /* ── Metric cards ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .metric-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .metric-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    line-height: 1;
  }
  .metric-value.accent  { color: var(--accent); }
  .metric-value.accent2 { color: var(--accent2); }
  .metric-value.warn    { color: var(--warn); }
  .metric-unit { font-size: 11px; color: var(--muted); margin-left: 2px; }

  /* ── Chart ── */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 1.5rem;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .chart-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .chart-range {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
  }
  .chart-wrap { position: relative; height: 180px; }

  /* ── Progress ── */
  .progress-wrap { margin-bottom: 1.5rem; display: none; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  button {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.97); }
  #btn-connect {
    border-color: var(--accent);
    color: var(--accent);
  }
  #btn-connect:hover, #btn-connect.active {
    background: var(--accent);
    color: var(--bg);
  }
  #btn-export {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  #btn-export:hover {
    background: var(--accent2);
    color: var(--bg);
  }
  #btn-export:disabled {
    border-color: var(--border);
    color: var(--muted);
    cursor: default;
  }
  #btn-clear {
    border-color: var(--warn);
    color: var(--warn);
    flex: 0 0 auto;
    padding: 14px 16px;
  }

  /* ── Log ── */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .log-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  #log {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding: 12px 14px;
    height: 140px;
    overflow-y: auto;
    line-height: 1.7;
  }
  #log .ok   { color: var(--accent2); }
  #log .info { color: var(--accent); }
  #log .warn { color: var(--warn); }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 2rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Firmware v2.0 · BLE 5.0 · DLE</div>
    <h1>Blue<span>Pill</span></h1>
  </header>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">En attente</span>
    <span id="device-name"></span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Mesures</div>
      <div class="metric-value accent" id="m-count">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Temp min</div>
      <div class="metric-value" id="m-min">—<span class="metric-unit">°C</span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Temp max</div>
      <div class="metric-value warn" id="m-max">—<span class="metric-unit">°C</span></div>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <span class="chart-title">Historique température</span>
      <span class="chart-range" id="chart-range">—</span>
    </div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span>Réception données</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="btn-row">
    <button id="btn-connect">Connecter</button>
    <button id="btn-export" disabled>Exporter CSV</button>
    <button id="btn-clear" title="Effacer données">✕</button>
  </div>

  <div class="log-card">
    <div class="log-header">
      <span class="log-title">Console</span>
    </div>
    <div id="log"></div>
  </div>

  <footer>BLUEPILL LOGGER · OPEN IN BLUEFY</footer>
</div>

<script>
// ── UUIDs BLE (à adapter selon ton fichier gatt_configuration.btconf) ──────
const SERVICE_UUID  = '00000001-0000-1000-8000-00805f9b34fb'; // à remplacer
const CHAR_HISTORY  = '00000002-0000-1000-8000-00805f9b34fb'; // à remplacer

// ── État global ──────────────────────────────────────────────────────────────
let temperatures = [];
let device = null;
let char = null;
let expectedCount = 0;
let chart = null;

// ── Chart setup ──────────────────────────────────────────────────────────────
function initChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: '#00d4ff',
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        backgroundColor: 'rgba(0,212,255,0.06)',
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#111820',
        borderColor: '#1e2a35',
        borderWidth: 1,
        titleColor: '#00d4ff',
        bodyColor: '#c8d8e8',
        titleFont: { family: 'IBM Plex Mono', size: 11 },
        bodyFont:  { family: 'IBM Plex Mono', size: 11 },
        callbacks: {
          title: (items) => `Index ${items[0].dataIndex}`,
          label: (item)  => `${item.raw.toFixed(1)} °C`
        }
      }},
      scales: {
        x: { display: false },
        y: {
          grid: { color: '#1e2a35' },
          ticks: { color: '#4a6070', font: { family: 'IBM Plex Mono', size: 10 },
                   callback: v => v.toFixed(1) + '°' }
        }
      }
    }
  });
}

// ── Mise à jour interface ─────────────────────────────────────────────────────
function updateMetrics() {
  if (temperatures.length === 0) return;
  const min = Math.min(...temperatures);
  const max = Math.max(...temperatures);
  document.getElementById('m-count').textContent = temperatures.length;
  document.getElementById('m-min').innerHTML = min.toFixed(1) + '<span class="metric-unit">°C</span>';
  document.getElementById('m-max').innerHTML = max.toFixed(1) + '<span class="metric-unit">°C</span>';

  chart.data.labels   = temperatures.map((_, i) => i);
  chart.data.datasets[0].data = temperatures;
  chart.update();

  // Plage temporelle estimée (5 min par mesure)
  const minutes = (temperatures.length - 1) * 5;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  document.getElementById('chart-range').textContent =
    temperatures.length > 1 ? (h > 0 ? `${h}h${m.toString().padStart(2,'0')}` : `${m} min`) : '—';

  document.getElementById('btn-export').disabled = false;
}

function setStatus(state, text, deviceName) {
  const dot = document.getElementById('dot');
  dot.className = 'dot ' + state;
  document.getElementById('status-text').textContent = text;
  document.getElementById('device-name').textContent = deviceName || '';
}

function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  const now = new Date();
  const t = now.toTimeString().slice(0,8);
  line.textContent = `[${t}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function showProgress(received, total) {
  const wrap = document.getElementById('progress-wrap');
  wrap.style.display = 'block';
  const pct = total > 0 ? Math.round(received / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  if (pct >= 100) setTimeout(() => { wrap.style.display = 'none'; }, 1500);
}

// ── Réception données BLE ────────────────────────────────────────────────────
function onIndication(event) {
  const data = event.target.value;
  const count = data.byteLength / 2;

  for (let i = 0; i < count; i++) {
    const raw = data.getInt16(i * 2, true); // little-endian
    temperatures.push(raw / 10.0);
  }

  log(`Batch reçu : ${count} valeurs (total : ${temperatures.length})`, 'info');
  showProgress(temperatures.length, expectedCount || temperatures.length);
  updateMetrics();

  // Mise à jour de l'expectedCount si on connaît le total
  if (temperatures.length >= expectedCount && expectedCount > 0) {
    log(`Dump terminé — ${temperatures.length} mesures reçues`, 'ok');
    setStatus('connected', 'Dump terminé', device ? device.name : '');
  }
}

// ── Connexion BLE ────────────────────────────────────────────────────────────
async function connect() {
  try {
    setStatus('connecting', 'Recherche...', '');
    log('Scan BLE en cours...', 'info');

    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'BluePill' }],
      optionalServices: [SERVICE_UUID]
    });

    log(`Appareil trouvé : ${device.name}`, 'ok');
    setStatus('connecting', 'Connexion...', device.name);

    device.addEventListener('gattserverdisconnected', onDisconnected);

    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    char          = await service.getCharacteristic(CHAR_HISTORY);

    log('Service GATT connecté', 'ok');
    setStatus('dumping', 'Réception données...', device.name);

    char.addEventListener('characteristicvaluechanged', onIndication);
    await char.startNotifications();

    log('Indications activées — dump automatique en cours...', 'ok');
    document.getElementById('btn-connect').textContent = 'Déconnecter';
    document.getElementById('btn-connect').classList.add('active');

  } catch (err) {
    log(`Erreur : ${err.message}`, 'warn');
    setStatus('', 'Erreur de connexion', '');
  }
}

function onDisconnected() {
  log('Déconnecté', 'warn');
  setStatus('', 'Déconnecté', '');
  document.getElementById('btn-connect').textContent = 'Connecter';
  document.getElementById('btn-connect').classList.remove('active');
  char = null;
  device = null;
}

async function disconnect() {
  if (device && device.gatt.connected) {
    await device.gatt.disconnect();
  }
}

// ── Export CSV ───────────────────────────────────────────────────────────────
function exportCSV() {
  if (temperatures.length === 0) return;

  const intervalMin = 5;
  const now = new Date();
  // On remonte dans le temps depuis maintenant
  const startTime = new Date(now.getTime() - (temperatures.length - 1) * intervalMin * 60000);

  let csv = 'index,timestamp_estimé,température_°C\n';
  temperatures.forEach((t, i) => {
    const ts = new Date(startTime.getTime() + i * intervalMin * 60000);
    const iso = ts.toISOString().slice(0, 19).replace('T', ' ');
    csv += `${i},${iso},${t.toFixed(1)}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `bluepill_${now.toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  log(`CSV exporté — ${temperatures.length} lignes`, 'ok');
}

// ── Listeners boutons ────────────────────────────────────────────────────────
document.getElementById('btn-connect').addEventListener('click', () => {
  if (device && device.gatt.connected) disconnect();
  else connect();
});

document.getElementById('btn-export').addEventListener('click', exportCSV);

document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Effacer toutes les données affichées ?')) return;
  temperatures = [];
  chart.data.labels = [];
  chart.data.datasets[0].data = [];
  chart.update();
  document.getElementById('m-count').textContent = '—';
  document.getElementById('m-min').innerHTML = '—';
  document.getElementById('m-max').innerHTML = '—';
  document.getElementById('chart-range').textContent = '—';
  document.getElementById('btn-export').disabled = true;
  log('Données effacées', 'warn');
});

// ── Init ─────────────────────────────────────────────────────────────────────
initChart();
log('BluePill Logger prêt — appuie sur Connecter', 'ok');
</script>
</body>
</html>
