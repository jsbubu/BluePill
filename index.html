<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BluePill Logger - Robust</title>
<script src="./chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

:root {
    --bg: #0a0e14;
    --surface: #111820;
    --border: #1e2a35;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --warn: #ff6b35;
    --text: #c8d8e8;
    --muted: #4a6070;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

header { margin-bottom: 2rem; }
.logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
}
h1 { font-family: var(--mono); font-size: 28px; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
h1 span { color: var(--accent2); }

.status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1.5rem;
    font-family: var(--mono);
    font-size: 12px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.dot.connected { background: var(--accent2); }
.dot.connecting { background: var(--accent); }
.dot.dumping { background: var(--warn); }

.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.metric-label { font-family: var(--mono); font-size: 9px; color: var(--muted); }
.metric-value { font-family: var(--mono); font-size: 20px; }
.metric-value.accent { color: var(--accent); }
.metric-value.warn { color: var(--warn); }

.chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 1.5rem; }
.chart-wrap { height: 180px; }

.btn-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
button {
    flex: 1; padding: 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text); font-family: var(--mono);
}
#btn-connect { border-color: var(--accent); color: var(--accent); }
#btn-export.ready { border-color: var(--accent2); color: var(--accent2); }

.log-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; }
#log { font-family: var(--mono); font-size: 11px; padding: 12px; height: 140px; overflow-y: auto; }

</style>
</head>
<body>
<div class="app">
<header>
<div class="logo">Firmware v2.1 · BLE 5.0</div>
<h1>Blue<span>Pill</span></h1>
</header>

<div class="status-bar">
<div class="dot" id="dot"></div>
<span id="status-text">Prêt</span>
<span id="device-name"></span>
</div>

<div class="metrics">
<div class="metric"><div class="metric-label">Points</div><div class="metric-value accent" id="m-count">0</div></div>
<div class="metric"><div class="metric-label">Min</div><div class="metric-value" id="m-min">—</div></div>
<div class="metric"><div class="metric-label">Max</div><div class="metric-value warn" id="m-max">—</div></div>
</div>

<div class="chart-card">
<div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>

<div class="btn-row">
<button id="btn-connect">Connecter</button>
<button id="btn-export" disabled>Exporter</button>
</div>

<div class="log-card">
<div id="log"></div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

const SERVICE_UUID  = '00001809-0000-1000-8000-00805f9b34fb'; 
const CHAR_HISTORY  = 'a838e31a-d72f-4a89-8a21-a47fd67da42f';

let device=null, char=null, temperatures=[];
let lastPacketTime=null, lostWarnings=0, packetCount=0;
let chart;

let tempMin = Infinity, tempMax = -Infinity;
const GAP_THRESHOLD_MS = 4000;
const DUMP_TIMEOUT_MS = 6000;
const MAX_STORE = 50000;

let dumpTimer = null;

// ---------- STATUS UI ----------
function setStatus(state, text, name="") {
  const dot = document.getElementById('dot');
  const status = document.getElementById('status-text');
  const dev = document.getElementById('device-name');

  dot.className = 'dot ' + state;
  status.textContent = text;
  dev.textContent = name || "";
}

// ---------- LOG ----------
function log(msg,type="INFO"){
 const el=document.getElementById('log');
 el.innerHTML+=`[${new Date().toLocaleTimeString()}][${type}] ${msg}<br>`;
 el.scrollTop=el.scrollHeight;
}

// ---------- MIN/MAX ----------
function updateMinMax(t) {
  if (t < tempMin) tempMin = t;
  if (t > tempMax) tempMax = t;
}

// ---------- DUMP TIMER ----------
function resetDumpTimer() {
  if (dumpTimer) clearTimeout(dumpTimer);
  dumpTimer = setTimeout(() => {
    log(`Dump terminé — ${temperatures.length} mesures`, 'OK');
    setStatus('connected', 'Dump terminé', device?.name);
  }, DUMP_TIMEOUT_MS);
}

// ---------- CHART ----------
function initChart(){
 chart=new Chart(document.getElementById('chart'),{
  type:'line',
  data:{labels:[],datasets:[{data:[],borderWidth:2}]},
  options:{animation:false}
 });
}

// ---------- CONNECT ----------
async function connect(){
 try{
  setStatus('connecting',"Scan...");
  log("Scan...");

  device=await navigator.bluetooth.requestDevice({
    filters:[{namePrefix:'BluePill'}],
    optionalServices:[SERVICE_UUID]
  });

  device.addEventListener('gattserverdisconnected',onDisconnected);

  const server=await device.gatt.connect();
  log("GATT connecté");

  const service=await server.getPrimaryService(SERVICE_UUID);
  char=await service.getCharacteristic(CHAR_HISTORY);

  await char.startNotifications();
  char.addEventListener('characteristicvaluechanged',onData);

  setStatus('connected',"Connecté",device.name);
  log("Notifications ON");

 }catch(e){
  log(e.message,"ERR");
  setStatus('',"Erreur");
 }
}

// ---------- DATA RX ----------
function onData(e) {
  const now = Date.now();
  const dv = e.target.value;
  const count = dv.byteLength / 2;
  packetCount++;

  if (lastPacketTime && (now - lastPacketTime) > GAP_THRESHOLD_MS) {
    lostWarnings++;
    log('Gap détecté — possible perte', 'WARN');
  }

  lastPacketTime = now;

  log(`RX #${packetCount} — ${count} valeurs (${dv.byteLength} bytes)`);

  for (let i = 0; i < count; i++) {
    const t = dv.getInt16(i * 2, true) / 10;

    if (t < -50 || t > 150) {
      log(`Valeur aberrante ignorée : ${t}°C`, 'WARN');
      continue;
    }

    if (temperatures.length < MAX_STORE) {
      temperatures.push(t);
      updateMinMax(t);
    } else {
      log("Buffer plein — données ignorées", "WARN");
    }
  }

  resetDumpTimer();
  updateUI();

  document.getElementById('btn-export').disabled = false;
}

// ---------- UI ----------
function updateUI(){
 if(!temperatures.length) return;

 document.getElementById('m-count').textContent=temperatures.length;
 document.getElementById('m-min').textContent=tempMin.toFixed(1);
 document.getElementById('m-max').textContent=tempMax.toFixed(1);

 const data=temperatures.slice(-2000);
 chart.data.labels=data.map((_,i)=>i);
 chart.data.datasets[0].data=data;
 chart.update();
}

// ---------- EXPORT ----------
function exportCSV() {
  const intervalMin = 5;
  const now = new Date();
  const start = new Date(now - (temperatures.length - 1) * intervalMin * 60000);

  let csv = 'index,timestamp_estime,temperature_C\n';

  temperatures.forEach((t, i) => {
    const ts = new Date(start.getTime() + i * intervalMin * 60000);
    csv += `${i},${ts.toISOString().slice(0,19).replace('T',' ')},${t.toFixed(1)}\n`;
  });

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const file = new File([csv], `bluepill_${now.toISOString().slice(0,10)}.csv`,
                        { type: 'text/plain' });

  if (isIOS && navigator.canShare?.({ files: [file] })) {
    navigator.share({ files: [file], title: 'BluePill CSV' });
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = file.name;
    a.click();
  }

  if (lostWarnings > 0)
    log(`⚠ ${lostWarnings} gaps détectés`, 'WARN');
}

// ---------- DISCONNECT ----------
function onDisconnected(){
 log("Déconnecté","WARN");
 setStatus('',"Déconnecté");

 if(temperatures.length)
   log("⚠ dump incomplet","WARN");
}

// ---------- FREEZE DETECTION ----------
setInterval(() => {
  if (lastPacketTime && Date.now() - lastPacketTime > 8000) {
    log("⚠ Aucun paquet reçu depuis 8s", "WARN");
  }
}, 2000);

// ---------- BUTTONS ----------
document.getElementById('btn-connect').onclick=()=>{
 device?.gatt.connected ? device.gatt.disconnect() : connect();
};

document.getElementById('btn-export').onclick=exportCSV;

// ---------- INIT ----------
initChart();
setStatus('',"Prêt");
</script>
</body>
</html>
